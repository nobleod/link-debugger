<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Debugger — Social Preview Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0d0f;
    --surface: #141518;
    --surface2: #1c1e23;
    --border: #2a2d35;
    --accent: #e8ff47;
    --accent2: #47d4ff;
    --accent3: #ff6b47;
    --text: #f0f0ee;
    --muted: #6b6f7a;
    --success: #4ade80;
    --warn: #fbbf24;
    --error: #f87171;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

  /* HEADER */
  header {
    padding: 40px 0 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .logo-area h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .logo-area h1 span { color: var(--accent); }
  .logo-area p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: rgba(232,255,71,0.1);
    color: var(--accent);
    border: 1px solid rgba(232,255,71,0.25);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
  }

  /* INPUT SECTION */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .input-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
  }
  .input-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .input-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .url-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }
  .url-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--muted); }

  .btn-primary {
    background: var(--accent);
    color: #0c0d0f;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary:hover { background: #d4eb2e; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .example-links {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .example-links span { font-size: 12px; color: var(--muted); }
  .pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.06); }

  /* STATUS BAR */
  #status-bar {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 13px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESULTS */
  #results { display: none; }

  /* SCORE BANNER */
  .score-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 28px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .score-left { display: flex; align-items: center; gap: 16px; }
  .score-circle {
    width: 60px; height: 60px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 900;
    flex-shrink: 0;
  }
  .score-label { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .score-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    border: 1px solid;
  }
  .stat-pill.ok { background: rgba(74,222,128,0.08); border-color: rgba(74,222,128,0.25); color: var(--success); }
  .stat-pill.warn { background: rgba(251,191,36,0.08); border-color: rgba(251,191,36,0.25); color: var(--warn); }
  .stat-pill.bad { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.25); color: var(--error); }

  /* TWO-COL LAYOUT */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 720px) { .two-col { grid-template-columns: 1fr; } }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }
  .card-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .platform-icon { font-size: 16px; }
  .card-body { padding: 20px; }

  /* PREVIEW CARDS */
  .fb-preview {
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .fb-preview .thumb {
    width: 100%; aspect-ratio: 1.91/1;
    background: var(--border);
    overflow: hidden;
    position: relative;
  }
  .fb-preview .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .fb-preview .thumb .no-img {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: #999; font-size: 12px;
  }
  .fb-preview .meta { padding: 10px 12px; background: #f2f3f5; border-top: 1px solid #ddd; }
  .fb-preview .meta .domain { font-size: 11px; color: #606770; text-transform: uppercase; margin-bottom: 2px; }
  .fb-preview .meta .title { font-size: 16px; font-weight: 600; color: #1c1e21; line-height: 1.3; margin-bottom: 2px; }
  .fb-preview .meta .desc { font-size: 14px; color: #606770; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  .tw-preview {
    background: #000;
    border: 1px solid #2f3336;
    border-radius: 16px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .tw-preview .thumb { width: 100%; aspect-ratio: 1.91/1; background: #1a1a1a; overflow: hidden; position: relative; }
  .tw-preview .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tw-preview .thumb .no-img { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 12px; }
  .tw-preview .meta { padding: 12px 14px; }
  .tw-preview .meta .title { font-size: 15px; font-weight: 700; color: #e7e9ea; margin-bottom: 2px; }
  .tw-preview .meta .desc { font-size: 13px; color: #71767b; margin-bottom: 4px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .tw-preview .meta .domain { font-size: 13px; color: #71767b; }

  .li-preview {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 2px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .li-preview .thumb { width: 100%; aspect-ratio: 1.91/1; background: #f3f2ef; overflow: hidden; position: relative; }
  .li-preview .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .li-preview .thumb .no-img { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #999; font-size: 12px; }
  .li-preview .meta { padding: 8px 12px; background: #f3f2ef; }
  .li-preview .meta .title { font-size: 14px; font-weight: 600; color: rgba(0,0,0,0.9); }
  .li-preview .meta .domain { font-size: 12px; color: rgba(0,0,0,0.6); margin-top: 2px; }

  .wa-preview {
    background: #1f2c34;
    border-radius: 8px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    gap: 0;
  }
  .wa-preview .thumb { width: 80px; min-height: 80px; background: #2a3942; flex-shrink: 0; overflow: hidden; }
  .wa-preview .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .wa-preview .thumb .no-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #555; font-size: 20px; }
  .wa-preview .meta { padding: 10px 12px; flex: 1; }
  .wa-preview .meta .domain { font-size: 11px; color: #00a884; margin-bottom: 2px; }
  .wa-preview .meta .title { font-size: 13px; font-weight: 600; color: #e9edef; line-height: 1.3; }
  .wa-preview .meta .desc { font-size: 12px; color: #8696a0; margin-top: 2px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  /* META TABLE */
  .meta-table { width: 100%; border-collapse: collapse; }
  .meta-table tr { border-bottom: 1px solid var(--border); }
  .meta-table tr:last-child { border-bottom: none; }
  .meta-table td { padding: 10px 0; vertical-align: top; }
  .meta-table td:first-child {
    width: 160px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding-right: 16px;
    padding-top: 12px;
  }
  .meta-val {
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
    line-height: 1.5;
  }
  .meta-val.missing { color: var(--error); font-style: italic; }
  .meta-val.ok { color: var(--success); }

  .tag-chip {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 4px;
    margin-bottom: 4px;
  }

  /* ISSUES */
  .issue-list { display: flex; flex-direction: column; gap: 8px; }
  .issue-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
  }
  .issue-item.error { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); }
  .issue-item.warning { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.2); }
  .issue-item.info { background: rgba(71,212,255,0.08); border: 1px solid rgba(71,212,255,0.2); }
  .issue-icon { flex-shrink: 0; font-size: 15px; margin-top: 1px; }
  .issue-text strong { display: block; margin-bottom: 2px; }
  .issue-text small { opacity: 0.7; font-size: 12px; }

  /* COPY META SECTION */
  .copy-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .code-block {
    background: var(--bg);
    padding: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.8;
    color: #a8b5c8;
    overflow-x: auto;
    white-space: pre;
  }
  .code-block .tag { color: #7dd3fc; }
  .code-block .attr { color: #c4b5fd; }
  .code-block .val { color: #86efac; }

  .copy-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { color: var(--success); border-color: rgba(74,222,128,0.4); }

  /* PLATFORM TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .url-row { flex-direction: column; }
    .score-banner { flex-direction: column; }
    header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .meta-table td:first-child { width: 120px; }
  }

  /* FADE IN */
  .fade-in { animation: fadeIn 0.4s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .full-card { grid-column: 1 / -1; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-area">
      <h1>Link<span>Debug</span></h1>
      <p>Social Share Preview & Open Graph Analyser</p>
    </div>
    <span class="badge">v2.0</span>
  </header>

  <!-- INPUT -->
  <div class="input-section">
    <div class="input-label">Enter URL to analyse</div>
    <div class="url-row">
      <input type="text" class="url-input" id="urlInput"
        placeholder="https://gript.ie/article-slug/"
        value="">
      <button class="btn-primary" id="analyseBtn" onclick="analyse()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Analyse
      </button>
    </div>
    <div class="example-links">
      <span>Try:</span>
      <button class="pill" onclick="setUrl('https://gript.ie')">gript.ie</button>
      <button class="pill" onclick="setUrl('https://bbc.com/news')">bbc.com/news</button>
      <button class="pill" onclick="setUrl('https://rte.ie')">rte.ie</button>
      <button class="pill" onclick="setUrl('https://irishtimes.com')">irishtimes.com</button>
    </div>
  </div>

  <!-- STATUS -->
  <div id="status-bar">
    <div class="spinner"></div>
    <span id="status-text">Fetching Open Graph data…</span>
  </div>

  <!-- RESULTS -->
  <div id="results">

    <!-- SCORE BANNER -->
    <div class="score-banner fade-in" id="scoreBanner">
      <div class="score-left">
        <div class="score-circle" id="scoreCircle">—</div>
        <div>
          <div id="scoreLabel" style="font-weight:600; font-size:15px;">Analysing…</div>
          <div class="score-label" id="scoreUrl"></div>
        </div>
      </div>
      <div class="score-pills" id="scorePills"></div>
    </div>

    <!-- PREVIEWS -->
    <div style="margin-bottom: 20px;" class="fade-in">
      <div class="tabs" id="previewTabs">
        <button class="tab active" onclick="showPreview('fb',this)">📘 Facebook</button>
        <button class="tab" onclick="showPreview('tw',this)">𝕏 Twitter/X</button>
        <button class="tab" onclick="showPreview('li',this)">💼 LinkedIn</button>
        <button class="tab" onclick="showPreview('wa',this)">💬 WhatsApp</button>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title" id="previewLabel"><span class="platform-icon">📘</span> Facebook Preview</div>
          <div style="font-size:11px; color:var(--muted); font-family:'DM Mono',monospace;">LIVE SIMULATION</div>
        </div>
        <div class="card-body" id="previewBody"></div>
        <div style="padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface2); display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
          <button class="copy-btn" id="copyUrlBtn" onclick="copyUrl()" style="padding: 8px 16px; font-size: 12px;">🔗 Copy URL</button>
          <button class="copy-btn" id="copyShareBtn" onclick="copyShareSummary()" style="padding: 8px 16px; font-size: 12px;">📋 Copy Title + Description</button>
          <button class="copy-btn" id="copyImageBtn" onclick="copyImageUrl()" style="padding: 8px 16px; font-size: 12px;">🖼️ Copy Image URL</button>
          <button class="copy-btn" id="copyImgFileBtn" onclick="copyImageToClipboard()" style="padding: 8px 16px; font-size: 12px;">📸 Copy Thumbnail</button>
          <button class="copy-btn" id="downloadImgBtn" onclick="downloadImage()" style="padding: 8px 16px; font-size: 12px;">⬇️ Download Thumbnail</button>
          <span id="copyPreviewFeedback" style="font-family:'DM Mono',monospace; font-size:11px; color:var(--success); display:none;">✅ Copied!</span>
        </div>
      </div>
    </div>

    <!-- META + ISSUES -->
    <div class="two-col fade-in">

      <!-- META TABLE -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">🔍 Raw Meta Tags</div>
          <button class="copy-btn" id="copyMetaBtn" onclick="copyMeta()">📋 Copy HTML</button>
        </div>
        <div class="card-body">
          <table class="meta-table" id="metaTable"></table>
        </div>
      </div>

      <!-- ISSUES -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">⚡ Diagnostics</div>
          <span id="issueCount" style="font-family:'DM Mono',monospace; font-size:11px; color:var(--muted);"></span>
        </div>
        <div class="card-body">
          <div class="issue-list" id="issueList"></div>
        </div>
      </div>

    </div>

    <!-- COPY META CODE -->
    <div class="copy-section fade-in">
      <div class="card-header" style="background:var(--surface2); padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
        <div class="card-title">📄 Recommended Meta Tags</div>
        <button class="copy-btn" id="copyCodeBtn" onclick="copyCode()">📋 Copy</button>
      </div>
      <div class="code-block" id="codeBlock"></div>
    </div>

    <!-- DIRECT DEBUGGER LINKS -->
    <div class="card fade-in">
      <div class="card-header">
        <div class="card-title">🔗 Official Platform Debuggers</div>
      </div>
      <div class="card-body" style="display:flex; gap:10px; flex-wrap:wrap;" id="debugLinks"></div>
    </div>

  </div><!-- /results -->

</div><!-- /wrap -->

<script>
// ── PROXY LIST ──────────────────────────────────────────────────────────────
// Each entry: { build: url => proxyUrl, parse: response => htmlString }
const PROXIES = [
  {
    name: 'allorigins',
    build: url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    parse: async res => { const j = await res.json(); return j.contents || ''; }
  },
  {
    name: 'corsproxy.io',
    build: url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    parse: async res => res.text()
  },
  {
    name: 'htmldriven',
    build: url => `https://cors-proxy.htmldriven.com/?url=${encodeURIComponent(url)}`,
    parse: async res => { const j = await res.json(); return j.body || ''; }
  },
  {
    name: 'codetabs',
    build: url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    parse: async res => res.text()
  },
  {
    name: 'thingproxy',
    build: url => `https://thingproxy.freeboard.io/fetch/${url}`,
    parse: async res => res.text()
  }
];

let currentData = null;
let currentPlatform = 'fb';

function setUrl(u) {
  document.getElementById('urlInput').value = u;
  analyse();
}

function showStatus(msg, isError) {
  const bar = document.getElementById('status-bar');
  bar.style.display = 'flex';
  document.getElementById('status-text').textContent = msg;
  const spinner = bar.querySelector('.spinner');
  if (spinner) spinner.style.display = isError ? 'none' : 'block';
}
function hideStatus() { document.getElementById('status-bar').style.display = 'none'; }

async function tryProxy(proxy, url) {
  const proxyUrl = proxy.build(url);
  const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const html = await proxy.parse(res);
  if (!html || html.length < 100) throw new Error('Empty response');
  return html;
}

async function fetchHtml(url) {
  const errors = [];
  for (let i = 0; i < PROXIES.length; i++) {
    const proxy = PROXIES[i];
    showStatus(`Trying proxy ${i + 1}/${PROXIES.length} (${proxy.name})…`);
    try {
      const html = await tryProxy(proxy, url);
      console.log(`✅ Success with proxy: ${proxy.name}`);
      return html;
    } catch(e) {
      console.warn(`❌ Proxy ${proxy.name} failed:`, e.message);
      errors.push(`${proxy.name}: ${e.message}`);
    }
  }
  throw new Error('All proxies failed. The site may block scrapers, or check your URL is correct.');
}

function parseMeta(html) {
  const d = new DOMParser().parseFromString(html, 'text/html');
  const g = (sel, attr) => {
    const el = d.querySelector(sel);
    return el ? (attr ? el.getAttribute(attr) : el.textContent.trim()) : null;
  };
  return {
    title:       g('meta[property="og:title"]','content') || g('title') || null,
    description: g('meta[property="og:description"]','content') || g('meta[name="description"]','content') || null,
    image:       g('meta[property="og:image"]','content') || null,
    url:         g('meta[property="og:url"]','content') || null,
    siteName:    g('meta[property="og:site_name"]','content') || null,
    type:        g('meta[property="og:type"]','content') || null,
    twCard:      g('meta[name="twitter:card"]','content') || null,
    twTitle:     g('meta[name="twitter:title"]','content') || null,
    twDesc:      g('meta[name="twitter:description"]','content') || null,
    twImage:     g('meta[name="twitter:image"]','content') || null,
    twSite:      g('meta[name="twitter:site"]','content') || null,
    canonical:   g('link[rel="canonical"]','href') || null,
    robots:      g('meta[name="robots"]','content') || null,
    themeColor:  g('meta[name="theme-color"]','content') || null,
    htmlTitle:   g('title') || null,
    favicon:     g('link[rel="icon"]','href') || g('link[rel="shortcut icon"]','href') || null,
  };
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch { return url; }
}

function score(data, url) {
  let pts = 0, total = 10;
  const issues = [];
  const checks = { ok:0, warn:0, bad:0 };

  const check = (condition, pts_val, type, title, hint) => {
    if (condition) { pts += pts_val; checks.ok++; }
    else {
      checks[type]++;
      issues.push({ type, title, hint });
    }
  };

  check(!!data.title, 2, 'error', 'Missing og:title', 'Add <meta property="og:title" content="Your Title">. This is the most important OG tag.');
  check(!!data.description, 2, 'error', 'Missing og:description', 'Add <meta property="og:description" content="...">. Without this, platforms show empty or random text.');
  check(!!data.image, 2, 'error', 'Missing og:image', 'Add <meta property="og:image" content="https://...jpg">. Articles without images get far less engagement.');

  if (data.image) {
    const isAbs = data.image.startsWith('http');
    check(isAbs, 1, 'error', 'og:image is a relative URL', 'Use an absolute URL: https://yourdomain.com/image.jpg — relative paths break on most platforms.');
  } else { total--; }

  check(!!data.twCard, 1, 'warning', 'Missing twitter:card', 'Add <meta name="twitter:card" content="summary_large_image"> for a large Twitter/X preview.');
  check(!!(data.twTitle || data.title), 0.5, 'warning', 'Missing twitter:title', 'Add <meta name="twitter:title"> for X-specific overrides.');
  check(!!data.siteName, 0.5, 'warning', 'Missing og:site_name', 'Add <meta property="og:site_name" content="Gript"> — shown below the title on Facebook.');
  check(!!data.url, 0.5, 'warning', 'Missing og:url', 'Add <meta property="og:url" content="canonical URL"> to avoid duplicate content issues.');
  check(!!data.canonical, 0.5, 'info', 'No canonical link', 'Add <link rel="canonical" href="..."> for SEO. Helps with link deduplication.');

  if (data.title && data.title.length > 90) {
    issues.push({ type:'warning', title:'og:title is very long (' + data.title.length + ' chars)', hint:'Keep og:title under 90 characters. Facebook truncates at ~100, Twitter at ~70.' });
    checks.warn++;
  }
  if (data.description && data.description.length > 200) {
    issues.push({ type:'info', title:'og:description is long (' + data.description.length + ' chars)', hint:'Platforms typically show 120–160 chars of description. Consider shortening for impact.' });
    checks.info = (checks.info||0)+1;
  }

  const pct = Math.round((pts / total) * 100);
  return { pct, issues, checks };
}

function proxyImg(src) {
  if (!src) return null;
  // Try direct first, fall back to allorigins image proxy
  return src;
}

function imgTag(src, fallbackSrc) {
  if (!src) return `<div class="no-img">🖼️ No og:image found</div>`;
  const proxied = `https://images.weserv.nl/?url=${encodeURIComponent(src)}&w=1200&output=jpg`;
  return `<img src="${proxied}" alt="preview"
    onerror="if(this.dataset.tried){this.parentNode.innerHTML='<div class=no-img>⚠️ Image blocked by server</div>'}else{this.dataset.tried=1;this.src='${src.replace(/'/g,"\\'")}'}">`;
}

function renderPreview(platform, data, url) {
  const domain = getDomain(url);
  const title = data.title || '(No title found)';
  const desc = data.description || '';
  const image = data.image || null;
  const imgHtml = imgTag(image);

  if (platform === 'fb') return `
    <div class="fb-preview">
      <div class="thumb">${imgHtml}</div>
      <div class="meta">
        <div class="domain">${domain}</div>
        <div class="title">${title}</div>
        <div class="desc">${desc}</div>
      </div>
    </div>`;

  if (platform === 'tw') return `
    <div class="tw-preview">
      <div class="thumb">${imgHtml}</div>
      <div class="meta">
        <div class="title">${data.twTitle || title}</div>
        <div class="desc">${data.twDesc || desc}</div>
        <div class="domain">🔗 ${domain}</div>
      </div>
    </div>`;

  if (platform === 'li') return `
    <div class="li-preview">
      <div class="thumb">${imgHtml}</div>
      <div class="meta">
        <div class="title">${title}</div>
        <div class="domain">${domain}</div>
      </div>
    </div>`;

  if (platform === 'wa') return `
    <div class="wa-preview">
      <div class="thumb">${image ? imgTag(image) : '<div class="no-img">🖼️</div>'}</div>
      <div class="meta">
        <div class="domain">${domain}</div>
        <div class="title">${title}</div>
        <div class="desc">${desc}</div>
      </div>
    </div>`;
}

}

    ['og:site_name', data.siteName],

async function analyse() {
  let url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;

  document.getElementById('results').style.display = 'none';
  showStatus('Fetching page via CORS proxy…');
  document.getElementById('analyseBtn').disabled = true;

  try {
    showStatus('Parsing Open Graph meta tags…');
    const html = await fetchHtml(url);
    if (!html) throw new Error('Empty response');

    const meta = parseMeta(html);
    const { pct, issues, checks } = score(meta, url);
    currentData = { meta, url };

    // SCORE
    const circle = document.getElementById('scoreCircle');
    circle.textContent = pct + '%';
    const color = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warn)' : 'var(--error)';
    circle.style.cssText = `background: ${color}22; border: 2px solid ${color}; color: ${color};`;
    document.getElementById('scoreLabel').textContent =
      pct >= 80 ? '✅ Well optimised for social sharing' :
      pct >= 50 ? '⚠️ Partially optimised — improvements needed' :
                  '❌ Poorly optimised — missing key tags';
    document.getElementById('scoreUrl').textContent = getDomain(url);

    const pills = [
      { label: `${checks.ok} Passed`, cls: 'ok' },
      { label: `${checks.warn} Warnings`, cls: 'warn' },
      { label: `${checks.bad} Errors`, cls: 'bad' },
    ];
    document.getElementById('scorePills').innerHTML = pills.map(p =>
      `<span class="stat-pill ${p.cls}">${p.label}</span>`).join('');

    // PREVIEW
    document.getElementById('previewBody').innerHTML = renderPreview(currentPlatform, meta, url);

    // META TABLE
    document.getElementById('metaTable').innerHTML = buildMetaTable(meta);

    // ISSUES
    const issEl = document.getElementById('issueList');
    if (issues.length === 0) {
      issEl.innerHTML = `<div class="issue-item info"><span class="issue-icon">✅</span><div class="issue-text"><strong>All checks passed!</strong><small>This page has solid OG meta tag coverage.</small></div></div>`;
    } else {
      issEl.innerHTML = issues.map(i => `
        <div class="issue-item ${i.type}">
          <span class="issue-icon">${i.type==='error'?'🔴':i.type==='warning'?'🟡':'🔵'}</span>
          <div class="issue-text">
            <strong>${i.title}</strong>
            <small>${i.hint}</small>
          </div>
        </div>`).join('');
    }
    document.getElementById('issueCount').textContent = `${issues.length} issue${issues.length!==1?'s':''}`;

    // CODE
    document.getElementById('codeBlock').innerHTML = buildCodeBlock(meta, url);

    // DEBUG LINKS
    document.getElementById('debugLinks').innerHTML = buildDebugLinks(url);

    hideStatus();
    const results = document.getElementById('results');
    results.style.display = 'block';
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch(e) {
    showStatus('⚠️ ' + e.message, true);
  }

  document.getElementById('analyseBtn').disabled = false;
}

function flashCopyFeedback() {
  const fb = document.getElementById('copyPreviewFeedback');
  fb.style.display = 'inline';
  setTimeout(() => { fb.style.display = 'none'; }, 2000);
}

async function getProxiedImageBlob() {
  if (!currentData || !currentData.meta.image) throw new Error('No image found');
  const proxied = `https://images.weserv.nl/?url=${encodeURIComponent(currentData.meta.image)}&output=jpg`;
  const res = await fetch(proxied);
  if (!res.ok) throw new Error('Could not fetch image');
  return await res.blob();
}

async function copyImageToClipboard() {
  const btn = document.getElementById('copyImgFileBtn');
  btn.textContent = '⏳ Copying…';
  try {
    const blob = await getProxiedImageBlob();
    // Convert to png for clipboard compatibility
    const imgBitmap = await createImageBitmap(blob);
    const canvas = document.createElement('canvas');
    canvas.width = imgBitmap.width;
    canvas.height = imgBitmap.height;
    canvas.getContext('2d').drawImage(imgBitmap, 0, 0);
    canvas.toBlob(async (pngBlob) => {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': pngBlob })
        ]);
        btn.textContent = '✅ Copied!'; btn.classList.add('copied');
        flashCopyFeedback();
      } catch(e) {
        btn.textContent = '❌ Browser blocked'; 
        console.error(e);
      }
      setTimeout(() => { btn.textContent = '📸 Copy Thumbnail'; btn.classList.remove('copied'); }, 2500);
    }, 'image/png');
  } catch(e) {
    btn.textContent = '❌ Failed';
    setTimeout(() => { btn.textContent = '📸 Copy Thumbnail'; btn.classList.remove('copied'); }, 2500);
    console.error(e);
  }
}

async function downloadImage() {
  const btn = document.getElementById('downloadImgBtn');
  btn.textContent = '⏳ Downloading…';
  try {
    const blob = await getProxiedImageBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    // Use article slug as filename
    const slug = (currentData.url || 'thumbnail').split('/').filter(Boolean).pop() || 'thumbnail';
    a.href = url;
    a.download = slug + '.jpg';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    btn.textContent = '✅ Downloaded!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⬇️ Download Thumbnail'; btn.classList.remove('copied'); }, 2500);
  } catch(e) {
    btn.textContent = '❌ Failed';
    setTimeout(() => { btn.textContent = '⬇️ Download Thumbnail'; btn.classList.remove('copied'); }, 2500);
    console.error(e);
  }
}

document.getElementById('urlInput').addEventListener('keydown', e => {
